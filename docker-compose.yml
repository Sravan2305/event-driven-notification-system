version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: notification-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: notification_fanout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: